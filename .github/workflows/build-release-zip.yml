name: Build WordPress Plugin ZIP

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and attach plugin ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare plugin folder
        run: |
          PLUGIN_SLUG="bloglogistics-site-management-tools"
          BUILD_DIR="/tmp/${PLUGIN_SLUG}"

          rm -rf "${BUILD_DIR}"
          mkdir -p "${BUILD_DIR}"

          rsync -av \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="${PLUGIN_SLUG}.zip" \
            ./ "${BUILD_DIR}/"

      - name: Create ZIP
        run: |
          PLUGIN_SLUG="bloglogistics-site-management-tools"
          cd /tmp
          zip -r "${GITHUB_WORKSPACE}/${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}"

      - name: Upload ZIP to release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PLUGIN_SLUG="bloglogistics-site-management-tools"
          gh release upload "${{ github.event.release.tag_name }}" "${PLUGIN_SLUG}.zip" --clobber

      - name: Upload ZIP as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: bloglogistics-site-management-tools
          path: bloglogistics-site-management-tools.zip

      - name: Build update manifest
        if: github.event_name == 'release'
        run: |
          python3 <<'PY'
          import datetime
          import html
          import json
          import re
          from pathlib import Path

          plugin_name = "BlogLogistics Site Management Tools"
          plugin_slug = "bloglogistics-site-management-tools"
          repo_url = "https://github.com/bloglogisticsdev/bloglogistics-site-management-tools"
          tag_name = "${{ github.event.release.tag_name }}"
          version = tag_name.lstrip("v")
          download_url = f"{repo_url}/releases/download/v{version}/{plugin_slug}.zip"
          last_updated = datetime.datetime.utcnow().strftime("%Y-%m-%d")

          readme_path = Path("readme.txt")
          readme = readme_path.read_text(encoding="utf-8", errors="replace")

          changelog_match = re.search(
              r"^==\s*Changelog\s*==\s*(.*?)(?=^==\s+|\Z)",
              readme,
              flags=re.IGNORECASE | re.MULTILINE | re.DOTALL,
          )

          changelog_text = changelog_match.group(1).strip() if changelog_match else ""

          html_parts = []
          current_items = []

          def flush_items():
              global current_items
              if current_items:
                  html_parts.append("<ul>")
                  for item in current_items:
                      html_parts.append(f"<li>{html.escape(item)}</li>")
                  html_parts.append("</ul>")
                  current_items = []

          for raw_line in changelog_text.splitlines():
              line = raw_line.strip()
              if not line:
                  continue

              version_heading = re.match(r"^=\s*(.*?)\s*=$", line)
              if version_heading:
                  flush_items()
                  html_parts.append(f"<h4>{html.escape(version_heading.group(1))}</h4>")
                  continue

              if line.startswith("*"):
                  current_items.append(line.lstrip("*").strip())
                  continue

              current_items.append(line)

          flush_items()

          changelog_html = "".join(html_parts) if html_parts else "<p>No changelog available.</p>"

          manifest = {
              "name": plugin_name,
              "version": version,
              "download_url": download_url,
              "homepage": repo_url,
              "requires": "7.0",
              "tested": "7.0",
              "requires_php": "8.3",
              "last_updated": last_updated,
              "sections": {
                  "description": "Protects BlogLogistics managed-site access and site management tools.",
                  "changelog": changelog_html,
              },
          }

          output_path = Path(f"{plugin_slug}.json")
          output_path.write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          print(output_path.read_text(encoding="utf-8"))
          PY

      - name: Upload update manifest by FTPS
        if: github.event_name == 'release'
        env:
          FTP_SERVER: ${{ secrets.BLOGLOGISTICS_UPDATES_FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.BLOGLOGISTICS_UPDATES_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.BLOGLOGISTICS_UPDATES_FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.BLOGLOGISTICS_UPDATES_FTP_SERVER_DIR }}
        run: |
          PLUGIN_SLUG="bloglogistics-site-management-tools"

          sudo apt-get update
          sudo apt-get install -y lftp

          lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" "${FTP_SERVER}" <<EOF
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate false
          cd "${FTP_SERVER_DIR}"
          put "${PLUGIN_SLUG}.json" -o "${PLUGIN_SLUG}.json"
          bye
          EOF